type Swap @entity(immutable: true) {
  id: Bytes!
  txHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  user: User!
  venue: Bytes!
  tokenIn: Bytes!
  tokenOut: Bytes!
  amountIn: BigInt!
  amountOut: BigInt!
  fee: BigInt!
}

type BridgeFee @entity(immutable: true) {
  id: Bytes!
  txHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  user: User!
  token: Bytes!
  amount: BigInt!
  tier: Int!
}

type User @entity {
  id: Bytes!
  firstSeen: BigInt!
  lastSeen: BigInt!
  swapCount: BigInt!
  bridgeFeeCount: BigInt!
  swaps: [Swap!]! @derivedFrom(field: "user")
  bridgeFees: [BridgeFee!]! @derivedFrom(field: "user")
}

type Venue @entity {
  id: Bytes!
  swapCount: BigInt!
  totalFee: BigInt!
}

type RouterStat @entity {
  id: Bytes!
  swapCount: BigInt!
  bridgeFeeCount: BigInt!
  uniqueUsers: BigInt!
  totalFee: BigInt!
  lastUpdated: BigInt!
}

type DayStat @entity {
  id: Bytes!
  date: Int!
  swapCount: BigInt!
  uniqueUsers: BigInt!
  totalFee: BigInt!
}

# ── Price tracking ─────────────────────────────────────────────────────────
# USD price is derived from any swap where one side is a known USD stablecoin
# (USDC). For a token X traded vs USDC, price = usdcAmount / tokenAmount, with
# both sides decimal-adjusted. Curve buys/sells route through the IntentRouter,
# so this captures real on-chain execution price — no oracle.

type Token @entity {
  id: Bytes! # token address
  symbol: String!
  decimals: Int!
  lastPriceUsd: BigDecimal!
  lastSwapVolumeUsd: BigDecimal!
  totalVolumeUsd: BigDecimal!
  swapCount: BigInt!
  lastUpdated: BigInt!
}

type TokenDayData @entity {
  id: Bytes! # token address ++ day index
  token: Token!
  date: Int! # days since unix epoch
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!
  volumeUsd: BigDecimal!
  swapCount: BigInt!
}
