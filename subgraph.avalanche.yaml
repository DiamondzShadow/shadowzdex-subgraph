specVersion: 1.0.0
description: ShadowzDex IntentRouter on Avalanche — swap volume, fees, and unique users.
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: IntentRouter
    network: avalanche
    source:
      address: "0x47D3fb05E195E2C51458F19edBaC8f93F845607A"
      abi: IntentRouter
      startBlock: 84342000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/intent-router.ts
      entities:
        - Swap
        - BridgeFee
        - User
        - Venue
        - RouterStat
        - DayStat
      abis:
        - name: IntentRouter
          file: ./abis/IntentRouter.json
      eventHandlers:
        - event: SwapExecuted(indexed address,indexed bytes32,address,address,uint256,uint256,uint256)
          handler: handleSwapExecuted
        - event: BridgeFeeCollected(indexed address,address,uint256,uint8)
          handler: handleBridgeFeeCollected
