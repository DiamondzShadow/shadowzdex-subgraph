specVersion: 1.0.0
description: ShadowzDex IntentRouter on HyperEVM — swap volume, fees, and unique users.
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: IntentRouter
    network: hyperevm
    source:
      address: "0x6E2E00F12D12379191dBD8B463A1A69531c873F0"
      abi: IntentRouter
      startBlock: 33942000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/intent-router.ts
      entities:
        - Swap
        - BridgeFee
        - User
        - Venue
        - RouterStat
        - DayStat
      abis:
        - name: IntentRouter
          file: ./abis/IntentRouter.json
      eventHandlers:
        - event: SwapExecuted(indexed address,indexed bytes32,address,address,uint256,uint256,uint256)
          handler: handleSwapExecuted
        - event: BridgeFeeCollected(indexed address,address,uint256,uint8)
          handler: handleBridgeFeeCollected
